<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#f7f7f8" />
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0%200%2064%2064'%3E%3Crect width='64' height='64' rx='14' fill='%23111827'/%3E%3Crect x='8' y='8' width='22' height='22' fill='%2322c55e'/%3E%3Crect x='34' y='8' width='22' height='22' fill='%2322c55e'/%3E%3Crect x='8' y='34' width='22' height='22' fill='%2322c55e'/%3E%3Crect x='34' y='34' width='22' height='22' fill='%2322c55e'/%3E%3C/svg%3E" />
  <title>无缝贴图预览 | Mecha Tools</title>
  <link rel="stylesheet" href="/src/index.css" />
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; font-family: system-ui, -apple-system, sans-serif; background: #1a1a2e; color: #e0e0e0; }

    .app-header {
      position: fixed; top: 0; left: 0; right: 0; z-index: 50;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      backdrop-filter: blur(8px);
      background: rgba(26,26,46,0.85);
      padding: 8px 16px; height: 44px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .app-header a { font-weight: 600; letter-spacing: 0.05em; text-decoration: none; color: #e0e0e0; font-size: 0.875rem; }
    .app-header a:hover { color: #fff; }
    .back-btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 6px 10px; border-radius: 6px;
      border: 1px solid rgba(255,255,255,0.15); background: rgba(255,255,255,0.05);
      color: #e0e0e0; text-decoration: none; font-size: 0.8rem;
      transition: background 0.15s;
    }
    .back-btn:hover { background: rgba(255,255,255,0.1); }

    .canvas-area {
      position: fixed; top: 44px; left: 0; right: 0; bottom: 0;
      cursor: grab; overflow: hidden;
    }
    .canvas-area.panning { cursor: grabbing; }
    #tileCanvas { display: block; width: 100%; height: 100%; }

    .drop-overlay {
      position: fixed; top: 44px; left: 0; right: 0; bottom: 0;
      background: rgba(34, 197, 94, 0.15);
      border: 3px dashed #22c55e;
      display: none; align-items: center; justify-content: center;
      font-size: 1.5rem; color: #22c55e; font-weight: 600;
      pointer-events: none; z-index: 40;
    }
    .drop-overlay.active { display: flex; }

    .controls-panel {
      position: fixed; top: 56px; right: 12px; z-index: 40;
      background: rgba(26,26,46,0.92); backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.1); border-radius: 10px;
      padding: 14px; width: 240px;
      display: flex; flex-direction: column; gap: 12px;
      font-size: 0.8rem; max-height: calc(100vh - 68px); overflow-y: auto;
    }

    .ctrl-section { display: flex; flex-direction: column; gap: 6px; }
    .ctrl-section h3 { margin: 0; font-size: 0.7rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: #9ca3af; }

    .btn {
      padding: 6px 12px; border-radius: 5px; border: 1px solid rgba(255,255,255,0.15);
      background: rgba(255,255,255,0.05); color: #e0e0e0; font-size: 0.8rem; cursor: pointer;
      transition: all 0.15s; font-weight: 500;
    }
    .btn:hover { background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.25); }
    .btn.active { background: #22c55e; color: #000; border-color: #22c55e; }

    .btn-group { display: flex; gap: 5px; }
    .btn-group .btn { flex: 1; text-align: center; padding: 5px 6px; }

    .upload-area {
      border: 1.5px dashed rgba(255,255,255,0.2); border-radius: 6px;
      padding: 10px; text-align: center; cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
    }
    .upload-area:hover { border-color: #22c55e; background: rgba(34,197,94,0.08); }
    .upload-area p { margin: 2px 0; font-size: 0.75rem; color: #9ca3af; }

    .texture-info { font-size: 0.7rem; color: #9ca3af; padding: 6px; background: rgba(255,255,255,0.03); border-radius: 5px; }

    .detection-results { display: flex; flex-direction: column; gap: 4px; }
    .detect-badge {
      display: flex; align-items: center; gap: 6px;
      padding: 6px 10px; border-radius: 5px;
      font-size: 0.75rem; font-weight: 500;
    }
    .detect-badge.pass { background: rgba(34,197,94,0.15); color: #4ade80; }
    .detect-badge.fail { background: rgba(239,68,68,0.15); color: #f87171; }
    .detect-badge .score { margin-left: auto; font-weight: 700; }

    .zoom-info { font-size: 0.7rem; color: #6b7280; text-align: center; }

    @media (max-width: 700px) {
      .controls-panel { width: 200px; right: 8px; top: 52px; padding: 10px; }
    }
  </style>
</head>
<body>
  <header class="app-header">
    <a href="/index.html">Mecha Tools</a>
    <span style="font-size:0.8rem;color:#9ca3af;">无缝贴图预览</span>
    <a class="back-btn" href="https://tobenot.top/Tobenot-Web-Tools/">返回首页</a>
  </header>

  <div class="canvas-area" id="canvasArea">
    <canvas id="tileCanvas"></canvas>
  </div>
  <div class="drop-overlay" id="dropOverlay">松开以加载贴图</div>

  <aside class="controls-panel">
    <div class="ctrl-section">
      <div class="upload-area" id="uploadArea">
        <p><b>点击上传</b> 或拖拽到画面</p>
        <p>PNG / JPG / WebP</p>
      </div>
      <input type="file" id="fileInput" accept="image/png,image/jpeg,image/webp" hidden />
    </div>

    <div class="ctrl-section texture-info" id="textureInfo">
      内置演示纹理 (32×32)
    </div>

    <div class="ctrl-section">
      <h3>显示</h3>
      <div class="btn-group">
        <button class="btn" id="btnGrid">网格线</button>
        <button class="btn" id="btnSeamHL">边缘高亮</button>
      </div>
    </div>

    <div class="ctrl-section">
      <h3>无缝检测</h3>
      <div class="detection-results" id="detectionResults">
        <div class="detect-badge pass">加载中...</div>
      </div>
    </div>

    <div class="ctrl-section">
      <button class="btn" id="btnReset" style="width:100%">重置演示纹理</button>
    </div>

    <div class="zoom-info" id="zoomInfo">滚轮缩放 · 拖拽平移</div>
  </aside>

  <script>
    (() => {
      'use strict';

      let textureCanvas = null;
      let zoom = 1;
      let showGrid = false;
      let showSeamHighlight = false;
      let panX = 0, panY = 0;
      let isPanning = false, panStartX = 0, panStartY = 0;

      const canvas = document.getElementById('tileCanvas');
      const ctx = canvas.getContext('2d');
      const canvasArea = document.getElementById('canvasArea');
      const dropOverlay = document.getElementById('dropOverlay');
      const uploadArea = document.getElementById('uploadArea');
      const fileInput = document.getElementById('fileInput');
      const btnGrid = document.getElementById('btnGrid');
      const btnSeamHL = document.getElementById('btnSeamHL');
      const btnReset = document.getElementById('btnReset');
      const detectionResults = document.getElementById('detectionResults');
      const textureInfo = document.getElementById('textureInfo');
      const zoomInfo = document.getElementById('zoomInfo');

      function generateDefaultTexture() {
        const size = 32;
        const tc = document.createElement('canvas');
        tc.width = size; tc.height = size;
        const tctx = tc.getContext('2d');
        const imgData = tctx.createImageData(size, size);
        const d = imgData.data;

        let seed = 42;
        function rand() { seed = (seed * 1664525 + 1013904223) & 0xFFFFFFFF; return (seed >>> 0) / 4294967296; }

        for (let y = 0; y < size; y++) {
          for (let x = 0; x < size; x++) {
            const i = (y * size + x) * 4;
            const noise = rand();
            if (noise < 0.15) {
              d[i] = 80 + (rand() * 20)|0;
              d[i+1] = 85 + (rand() * 20)|0;
              d[i+2] = 80 + (rand() * 15)|0;
            } else if (noise < 0.4) {
              d[i] = 50 + (rand() * 30)|0;
              d[i+1] = 120 + (rand() * 40)|0;
              d[i+2] = 40 + (rand() * 20)|0;
            } else {
              d[i] = 70 + (rand() * 30)|0;
              d[i+1] = 150 + (rand() * 50)|0;
              d[i+2] = 50 + (rand() * 25)|0;
            }
            d[i+3] = 255;
          }
        }

        const blendSize = 4;
        for (let y = 0; y < size; y++) {
          for (let bx = 0; bx < blendSize; bx++) {
            const alpha = bx / blendSize;
            const li = (y * size + bx) * 4;
            const ri = (y * size + (size - 1 - bx)) * 4;
            for (let c = 0; c < 3; c++) {
              const avg = (d[li + c] + d[ri + c]) / 2;
              d[li + c] = Math.round(d[li + c] * alpha + avg * (1 - alpha));
              d[ri + c] = Math.round(d[ri + c] * alpha + avg * (1 - alpha));
            }
          }
        }
        for (let x = 0; x < size; x++) {
          for (let by = 0; by < blendSize; by++) {
            const alpha = by / blendSize;
            const ti = (by * size + x) * 4;
            const bi = ((size - 1 - by) * size + x) * 4;
            for (let c = 0; c < 3; c++) {
              const avg = (d[ti + c] + d[bi + c]) / 2;
              d[ti + c] = Math.round(d[ti + c] * alpha + avg * (1 - alpha));
              d[bi + c] = Math.round(d[bi + c] * alpha + avg * (1 - alpha));
            }
          }
        }

        tctx.putImageData(imgData, 0, 0);
        return tc;
      }

      function loadImage(src) {
        return new Promise((resolve, reject) => {
          const img = new Image();
          img.onload = () => {
            const tc = document.createElement('canvas');
            tc.width = img.naturalWidth;
            tc.height = img.naturalHeight;
            const tctx = tc.getContext('2d');
            tctx.drawImage(img, 0, 0);
            resolve(tc);
          };
          img.onerror = reject;
          img.src = src;
        });
      }

      function autoFitZoom() {
        if (!textureCanvas) return;
        const rect = canvasArea.getBoundingClientRect();
        // Default: ~5 tiles across horizontally
        zoom = rect.width / (textureCanvas.width * 5);
        zoom = Math.max(0.1, zoom);
      }

      function loadFile(file) {
        if (!file || !file.type.startsWith('image/')) return;
        const reader = new FileReader();
        reader.onload = async (e) => {
          try {
            textureCanvas = await loadImage(e.target.result);
            textureInfo.textContent = `${file.name} (${textureCanvas.width}×${textureCanvas.height})`;
            panX = 0; panY = 0;
            autoFitZoom();
            runDetection();
            render();
          } catch(err) {
            textureInfo.textContent = '加载失败: ' + err.message;
          }
        };
        reader.readAsDataURL(file);
      }

      // --- Seamless Detection ---
      function detectSeamless(tc) {
        const w = tc.width, h = tc.height;
        const tctx = tc.getContext('2d');
        const data = tctx.getImageData(0, 0, w, h).data;

        function getPixel(x, y) {
          const i = (y * w + x) * 4;
          return [data[i], data[i+1], data[i+2], data[i+3]];
        }

        function colorDist(a, b) {
          const dr = a[0] - b[0], dg = a[1] - b[1], db = a[2] - b[2], da = a[3] - b[3];
          return Math.sqrt(dr*dr + dg*dg + db*db + da*da);
        }

        let hTotal = 0;
        for (let y = 0; y < h; y++) {
          hTotal += colorDist(getPixel(0, y), getPixel(w - 1, y));
        }
        const hAvg = hTotal / h;

        let vTotal = 0;
        for (let x = 0; x < w; x++) {
          vTotal += colorDist(getPixel(x, 0), getPixel(x, h - 1));
        }
        const vAvg = vTotal / w;

        const maxDist = 510;
        const hScore = Math.max(0, Math.round((1 - hAvg / maxDist) * 100));
        const vScore = Math.max(0, Math.round((1 - vAvg / maxDist) * 100));

        const threshold = 95;
        return { hScore, vScore, hSeamless: hScore >= threshold, vSeamless: vScore >= threshold };
      }

      function getSeamPixels(tc) {
        const w = tc.width, h = tc.height;
        const tctx = tc.getContext('2d');
        const data = tctx.getImageData(0, 0, w, h).data;

        function getPixel(x, y) {
          const i = (y * w + x) * 4;
          return [data[i], data[i+1], data[i+2], data[i+3]];
        }
        function colorDist(a, b) {
          const dr = a[0]-b[0], dg = a[1]-b[1], db = a[2]-b[2];
          return Math.sqrt(dr*dr + dg*dg + db*db);
        }

        const threshold = 30;
        const hSeams = [], vSeams = [];

        for (let y = 0; y < h; y++) {
          if (colorDist(getPixel(0, y), getPixel(w-1, y)) > threshold) hSeams.push(y);
        }
        for (let x = 0; x < w; x++) {
          if (colorDist(getPixel(x, 0), getPixel(x, h-1)) > threshold) vSeams.push(x);
        }
        return { hSeams, vSeams };
      }

      let detectionResult = null;
      let seamPixels = null;

      function runDetection() {
        if (!textureCanvas) return;
        detectionResult = detectSeamless(textureCanvas);
        seamPixels = getSeamPixels(textureCanvas);
        renderDetectionUI();
      }

      function renderDetectionUI() {
        if (!detectionResult) {
          detectionResults.innerHTML = '<div class="detect-badge pass">请加载贴图</div>';
          return;
        }
        const { hScore, vScore, hSeamless, vSeamless } = detectionResult;
        let html = '';
        if (hSeamless && vSeamless) {
          html += `<div class="detect-badge pass">✅ 完全无缝 (四方连续)</div>`;
        }
        html += `<div class="detect-badge ${hSeamless ? 'pass' : 'fail'}">${hSeamless ? '✅' : '❌'} 水平 <span class="score">${hScore}</span></div>`;
        html += `<div class="detect-badge ${vSeamless ? 'pass' : 'fail'}">${vSeamless ? '✅' : '❌'} 垂直 <span class="score">${vScore}</span></div>`;
        if (!hSeamless || !vSeamless) {
          html += `<div style="font-size:0.65rem;color:#6b7280;margin-top:2px;">≥95 为无缝，开启边缘高亮看细节</div>`;
        }
        detectionResults.innerHTML = html;
      }

      // --- Render ---
      function render() {
        const rect = canvasArea.getBoundingClientRect();
        const dpr = window.devicePixelRatio || 1;
        canvas.width = rect.width * dpr;
        canvas.height = rect.height * dpr;

        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        ctx.fillStyle = '#111';
        ctx.fillRect(0, 0, rect.width, rect.height);

        if (!textureCanvas) return;

        const tw = textureCanvas.width * zoom;
        const th = textureCanvas.height * zoom;

        if (tw < 1 || th < 1) return;

        // Use createPattern for seamless tiling (no gaps)
        ctx.save();
        ctx.imageSmoothingEnabled = true;
        const pattern = ctx.createPattern(textureCanvas, 'repeat');
        ctx.translate(panX % tw, panY % th);
        ctx.scale(zoom, zoom);
        pattern.setTransform && pattern.setTransform(new DOMMatrix());
        ctx.fillStyle = pattern;
        // Fill a large enough area to cover the viewport
        const fillX = -(panX % tw) / zoom - textureCanvas.width;
        const fillY = -(panY % th) / zoom - textureCanvas.height;
        const fillW = rect.width / zoom + textureCanvas.width * 2;
        const fillH = rect.height / zoom + textureCanvas.height * 2;
        ctx.fillRect(fillX, fillY, fillW, fillH);
        ctx.restore();

        // Grid lines
        if (showGrid) {
          const tw = textureCanvas.width * zoom;
          const th = textureCanvas.height * zoom;
          const offsetX = ((panX % tw) + tw) % tw;
          const offsetY = ((panY % th) + th) % th;

          ctx.strokeStyle = 'rgba(255, 80, 80, 0.6)';
          ctx.lineWidth = 1;
          ctx.setLineDash([4, 4]);

          for (let x = offsetX; x <= rect.width; x += tw) {
            ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, rect.height); ctx.stroke();
          }
          for (let y = offsetY; y <= rect.height; y += th) {
            ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(rect.width, y); ctx.stroke();
          }
          ctx.setLineDash([]);
        }

        // Seam highlight
        if (showSeamHighlight && seamPixels) {
          const tw = textureCanvas.width * zoom;
          const th = textureCanvas.height * zoom;
          const offsetX = ((panX % tw) + tw) % tw;
          const offsetY = ((panY % th) + th) % th;
          const { hSeams, vSeams } = seamPixels;
          const pxW = Math.max(1, tw / textureCanvas.width);
          const pxH = Math.max(1, th / textureCanvas.height);
          ctx.globalAlpha = 0.6;

          // Horizontal seam pixels at tile left/right edges
          for (let x = offsetX; x <= rect.width + tw; x += tw) {
            for (const sy of hSeams) {
              ctx.fillStyle = '#ef4444';
              const py = offsetY + sy * pxH - (sy * pxH > rect.height ? th : 0);
              // Draw at every vertical tile repeat
              for (let baseY = offsetY - th; baseY < rect.height + th; baseY += th) {
                ctx.fillRect(x - pxW / 2, baseY + sy * pxH, pxW, pxH);
              }
            }
          }

          // Vertical seam pixels at tile top/bottom edges
          for (let y = offsetY; y <= rect.height + th; y += th) {
            for (const sx of vSeams) {
              ctx.fillStyle = '#3b82f6';
              for (let baseX = offsetX - tw; baseX < rect.width + tw; baseX += tw) {
                ctx.fillRect(baseX + sx * pxW, y - pxH / 2, pxW, pxH);
              }
            }
          }

          ctx.globalAlpha = 1;
        }

        // Zoom indicator
        const tileSizeW = textureCanvas.width * zoom;
        const tilesAcross = Math.round(rect.width / tileSizeW);
        zoomInfo.textContent = `${Math.round(zoom * 100)}% · ~${tilesAcross}列 · 滚轮缩放 · 拖拽平移`;
      }

      // --- Events ---
      uploadArea.addEventListener('click', () => fileInput.click());
      fileInput.addEventListener('change', (e) => { if (e.target.files[0]) loadFile(e.target.files[0]); });

      let dragCounter = 0;
      canvasArea.addEventListener('dragenter', (e) => { e.preventDefault(); dragCounter++; dropOverlay.classList.add('active'); });
      canvasArea.addEventListener('dragleave', (e) => { e.preventDefault(); dragCounter--; if (dragCounter <= 0) { dragCounter = 0; dropOverlay.classList.remove('active'); } });
      canvasArea.addEventListener('dragover', (e) => e.preventDefault());
      canvasArea.addEventListener('drop', (e) => {
        e.preventDefault(); dragCounter = 0; dropOverlay.classList.remove('active');
        if (e.dataTransfer.files[0]) loadFile(e.dataTransfer.files[0]);
      });

      // Zoom with scroll wheel (centered on cursor)
      canvasArea.addEventListener('wheel', (e) => {
        e.preventDefault();
        const rect = canvasArea.getBoundingClientRect();
        const mx = e.clientX - rect.left;
        const my = e.clientY - rect.top;

        const factor = e.deltaY > 0 ? 0.85 : 1.18;
        const newZoom = Math.max(0.05, Math.min(50, zoom * factor));

        // Zoom toward cursor position
        panX = mx - (mx - panX) * (newZoom / zoom);
        panY = my - (my - panY) * (newZoom / zoom);
        zoom = newZoom;

        render();
      }, { passive: false });

      // Pan
      canvasArea.addEventListener('mousedown', (e) => {
        if (e.button === 0) {
          isPanning = true;
          panStartX = e.clientX - panX;
          panStartY = e.clientY - panY;
          canvasArea.classList.add('panning');
        }
      });
      window.addEventListener('mousemove', (e) => {
        if (!isPanning) return;
        panX = e.clientX - panStartX;
        panY = e.clientY - panStartY;
        render();
      });
      window.addEventListener('mouseup', () => { isPanning = false; canvasArea.classList.remove('panning'); });

      btnGrid.addEventListener('click', () => { showGrid = !showGrid; btnGrid.classList.toggle('active', showGrid); render(); });
      btnSeamHL.addEventListener('click', () => { showSeamHighlight = !showSeamHighlight; btnSeamHL.classList.toggle('active', showSeamHighlight); render(); });
      btnReset.addEventListener('click', () => {
        textureCanvas = generateDefaultTexture();
        textureInfo.textContent = '内置演示纹理 (32×32)';
        panX = 0; panY = 0;
        autoFitZoom();
        runDetection();
        render();
      });

      window.addEventListener('resize', render);

      // --- Init ---
      textureCanvas = generateDefaultTexture();
      autoFitZoom();
      runDetection();
      requestAnimationFrame(render);
    })();
  </script>
</body>
</html>
