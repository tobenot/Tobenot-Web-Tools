<!doctype html>
<html lang="zh-CN">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<meta name="theme-color" content="#f7f7f8" />
	<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0%200%2064%2064'%3E%3Crect width='64' height='64' rx='14' fill='%234f46e5'/%3E%3Cpath d='M18%2020h28M18%2032h20M18%2044h28' stroke='white' stroke-width='5' stroke-linecap='round'/%3E%3Cpath d='M42%2028l4%204%208-10' fill='none' stroke='%23a7f3d0' stroke-width='5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E" />
	<title>LLM Prompt 清洗工具 | Mecha Tools</title>
	<link rel="stylesheet" href="/src/index.css" />
	<style>
		/* 仅保留布局相关的少量自定义样式 */
		.clean-container {
			display: flex;
			flex: 1;
			gap: 16px;
			min-height: 0;
		}
		@media (max-width: 768px) {
			.clean-container {
				flex-direction: column;
			}
		}
		.text-box {
			flex: 1;
			display: flex;
			flex-direction: column;
			min-height: 260px;
		}
		.text-box textarea {
			flex: 1;
			width: 100%;
			resize: none;
			box-sizing: border-box;
		}
		.controls-col {
			display: flex;
			flex-direction: column;
			justify-content: center;
			gap: 10px;
			padding: 0 4px;
		}
		@media (max-width: 768px) {
			.controls-col {
				flex-direction: row;
				flex-wrap: wrap;
				padding: 0;
			}
		}
	</style>
</head>
<body class="min-h-screen bg-mech-bg text-mech-text antialiased flex flex-col">
	<main class="max-w-6xl mx-auto px-4 py-8 space-y-6 flex-1 flex flex-col w-full">
		<!-- 导航栏：与其他 app 统一 -->
		<header class="sticky top-0 z-30 border-b border-mech-edge/70 backdrop-blur bg-mech-bg/70 -mx-4 px-4 py-3">
			<div class="flex items-center justify-between">
				<a class="font-semibold tracking-wider hover:text-black" href="../../index.html">Mecha Tools</a>
				<a class="inline-flex items-center gap-2 px-3 py-2 rounded-md border border-mech-edge bg-white hover:bg-neutral-50 text-mech-text transition-colors" href="../../index.html">返回首页</a>
			</div>
		</header>

		<!-- 标题区域 -->
		<section class="text-center space-y-3">
			<h1 class="text-4xl font-bold tracking-wide bg-gradient-to-r from-indigo-600 to-violet-600 bg-clip-text text-transparent">
				🧹 LLM 文本清洗工具
			</h1>
			<p class="text-mech-muted text-lg">清洗文本中的空格、换行、引号，降低提示词 Token 冗余</p>
		</section>

		<!-- 主内容区域 -->
		<section class="bg-mech-panel border border-mech-edge rounded-xl shadow-subtle p-5 flex-1 flex flex-col min-h-0">
			<div class="clean-container">
				<!-- 左：原始文本 -->
				<div class="text-box">
					<div class="flex justify-between items-center mb-2">
						<span class="text-sm font-semibold text-mech-muted">原始文本</span>
						<button onclick="clearAll()" class="px-3 py-1 text-xs font-medium border border-mech-edge rounded-md bg-white hover:bg-neutral-50 text-mech-text transition-colors">清空</button>
					</div>
					<textarea
						id="inputText"
						placeholder="请在此粘贴杂乱的文本..."
						class="border border-mech-edge rounded-lg px-3 py-2 text-sm font-mono leading-relaxed focus:ring-2 focus:ring-indigo-500 focus:border-transparent"
					></textarea>
					<div id="inputStats" class="text-xs text-mech-muted mt-1.5">字符数: 0 | 行数: 0</div>
				</div>

				<!-- 中：操作按钮 -->
				<div class="controls-col">
					<button onclick="oneClickClean()" title="去多余换行、多余空格、双引号" class="px-4 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700 transition-colors font-medium shadow-sm text-sm whitespace-nowrap">一键处理</button>
					<button onclick="smartMerge()" title="连接断开的中文句子和数字单位，保留段落结构" class="px-4 py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 transition-colors font-medium shadow-sm text-sm whitespace-nowrap">✨ 智能去换行</button>
					<button onclick="removeExtraSpaces()" title="仅把多个空格变成一个空格" class="px-4 py-2 bg-gray-500 text-white rounded-lg hover:bg-gray-600 transition-colors font-medium shadow-sm text-sm whitespace-nowrap">去除多余空格</button>
					<button onclick="removeQuotes()" title="去掉所有双引号" class="px-4 py-2 bg-gray-500 text-white rounded-lg hover:bg-gray-600 transition-colors font-medium shadow-sm text-sm whitespace-nowrap">去除双引号</button>
					<button onclick="compressAll()" title="变成一整段" class="px-4 py-2 bg-gray-500 text-white rounded-lg hover:bg-gray-600 transition-colors font-medium shadow-sm text-sm whitespace-nowrap">暴力压缩</button>
				</div>

				<!-- 右：清洗后文本 -->
				<div class="text-box">
					<div class="flex justify-between items-center mb-2">
						<span class="text-sm font-semibold text-mech-muted">清洗后文本</span>
						<span id="savingsBadge" class="hidden px-2 py-0.5 text-xs font-bold rounded bg-green-100 text-green-800">减少 0%</span>
					</div>
					<textarea
						id="outputText"
						readonly
						placeholder="处理结果将显示在这里..."
						class="border border-mech-edge rounded-lg px-3 py-2 text-sm font-mono leading-relaxed bg-neutral-50"
					></textarea>
					<div id="outputStats" class="text-xs text-mech-muted mt-1.5">字符数: 0 | 行数: 0</div>
					<button id="copyBtn" onclick="copyResult()" class="mt-2 px-5 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700 transition-colors font-medium shadow-sm text-sm">📋 复制结果</button>
				</div>
			</div>
		</section>
	</main>

	<script>
		const inputEl = document.getElementById('inputText');
		const outputEl = document.getElementById('outputText');
		const inputStats = document.getElementById('inputStats');
		const outputStats = document.getElementById('outputStats');
		const savingsBadge = document.getElementById('savingsBadge');
		const copyBtn = document.getElementById('copyBtn');

		inputEl.addEventListener('input', () => {
			updateStats(inputEl.value, inputStats);
		});

		function removeExtraSpaces() {
			let text = inputEl.value;
			text = text.replace(/[ \t|]+/g, ' ');
			text = text.replace(/\n\s*\n/g, '\n');
			text = text.split('\n').map(line => line.trim()).join('\n');
			text = text.replace(/｜ /g, '');
			setOutput(text);
		}

		function oneClickClean() {
			let text = inputEl.value;
			text = text.replace(/\r\n/g, '\n');
			text = text.replace(/\n\s*\n/g, '\n');
			text = text.split('\n').map(line => line.trim()).join('\n');
			text = text.replace(/[ \t]+/g, ' ');
			text = text.replace(/"/g, '');
			text = text.replace(/\|/g, '');
			setOutput(text);
		}

		function removeQuotes() {
			let text = inputEl.value;
			text = text.replace(/"/g, '');
			text = text.replace(/\|/g, '');
			setOutput(text);
		}

		function compressAll() {
			let text = inputEl.value;
			text = text.replace(/\s+/g, ' ');
			text = text.replace(/\|/g, '');
			setOutput(text);
		}

		function smartMerge() {
			let text = inputEl.value;
			text = text.replace(/\r\n/g, '\n');
			text = text.replace(/\|/g, '');
			text = text.split('\n').map(line => line.trim()).filter(line => line !== '').join('\n');
			text = text.replace(/(\d+)\n([\u4e00-\u9fa5])/g, '$1$2');
			text = text.replace(/([\u4e00-\u9fa5])\n([\u4e00-\u9fa5])/g, '$1$2');
			text = text.replace(/([\u4e00-\u9fa5])\n(\d+)/g, '$1$2');
			text = text.replace(/([，、：])\n([\u4e00-\u9fa5])/g, '$1$2');
			setOutput(text);
		}

		function setOutput(text) {
			outputEl.value = text;
			updateStats(text, outputStats);
			calculateSavings();
		}

		function updateStats(text, element) {
			const charCount = text.length;
			const lineCount = text ? text.split(/\r\n|\r|\n/).length : 0;
			element.textContent = `字符数: ${charCount} | 行数: ${lineCount}`;
		}

		function calculateSavings() {
			const inLen = inputEl.value.length;
			const outLen = outputEl.value.length;
			if (inLen <= 0) {
				savingsBadge.classList.add('hidden');
				return;
			}
			const diff = inLen - outLen;
			const percent = ((diff / inLen) * 100).toFixed(1);
			savingsBadge.classList.remove('hidden');
			savingsBadge.textContent = `减少 ${diff} 字符 (${percent}%)`;
			if (diff > 0) {
				savingsBadge.className = 'px-2 py-0.5 text-xs font-bold rounded bg-green-100 text-green-800';
			} else {
				savingsBadge.className = 'px-2 py-0.5 text-xs font-bold rounded bg-gray-100 text-gray-600';
			}
		}

		function clearAll() {
			inputEl.value = '';
			outputEl.value = '';
			updateStats('', inputStats);
			updateStats('', outputStats);
			savingsBadge.classList.add('hidden');
		}

		async function copyResult() {
			if (!outputEl.value) return;
			const originalText = copyBtn.innerText;
			try {
				await navigator.clipboard.writeText(outputEl.value);
				copyBtn.innerText = '✅ 已复制!';
				setTimeout(() => {
					copyBtn.innerText = originalText;
				}, 2000);
			} catch (error) {
				copyBtn.innerText = '复制失败';
				setTimeout(() => {
					copyBtn.innerText = originalText;
				}, 2000);
			}
		}
	</script>
</body>
</html>
